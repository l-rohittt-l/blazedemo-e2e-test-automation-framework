# ============================================================
# BlazeDemo Automation Framework - Configuration
# ============================================================

# Target application URL
base.url=https://blazedemo.com

# Explicit wait timeout in seconds
browser.timeout=30

# Maximum retry attempts for failed tests
retry.count=2

# Data source for test data — valid values: excel, csv, database
data.source=excel

# Run browser in headless mode — set to true for CI environments without a display
browser.headless=false

# ============================================================
# MySQL Database Configuration 
# ============================================================
db.url=jdbc:mysql://localhost:3306/blazedemo_testdata
db.username=root
db.password=root
db.table=flight_bookings
